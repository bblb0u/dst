name: Docker Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dockerhub-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: bblb0u/dst
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute image tags
        run: |
          commit_date="$(git show -s --format=%aI "$GITHUB_SHA")"
          date_tag="$(date -u -d "$commit_date" +%Y%m%d)"
          today="$(date -u +%Y%m%d)"

          {
            echo "IMAGE_TAGS<<EOF"
            echo "${IMAGE_NAME}:${date_tag}"

            if [ "$date_tag" = "$today" ]; then
              echo "${IMAGE_NAME}:latest"
            fi

            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
